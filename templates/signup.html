{% extends 'base.html' %} {% block content %}
<main class="auth-shell" data-page="signup">
  <section class="auth-card">
    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Set up your banking profile in a few steps.</p>
    </div>
    <form
      id="signup-form"
      method="POST"
      action="/api/signup"
      class="auth-form"
      novalidate
    >
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
      <label for="signup-name">Full Name</label>
      <input
        id="signup-name"
        name="name"
        type="text"
        placeholder="Ava Banks"
        required
      />

      <label for="signup-email">Email</label>
      <input
        id="signup-email"
        name="email"
        type="email"
        placeholder="you@bank.com"
        required
      />

      <div class="field-group">
        <label for="signup-password">Password</label>
        <div class="password-field">
          <input
            id="signup-password"
            name="password"
            type="password"
            placeholder="Create a password"
            required
            autocomplete="new-password"
            aria-required="true"
          />
          <button
            type="button"
            class="password-toggle"
            data-target="signup-password"
            aria-label="Show password"
            aria-pressed="false"
          >
            <span class="password-toggle-icon" aria-hidden="true">👁</span>
          </button>
        </div>
      </div>

      <div class="field-group">
        <label for="signup-confirm-password">Confirm Password</label>
        <div class="password-field">
          <input
            id="signup-confirm-password"
            name="confirm_password"
            type="password"
            placeholder="Re-enter your password"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="password-toggle"
            data-target="signup-confirm-password"
            aria-label="Show confirm password"
            aria-pressed="false"
          >
            <span class="password-toggle-icon" aria-hidden="true">👁</span>
          </button>
        </div>
      </div>

      <label for="signup-pin">Transaction PIN</label>
      <input
        id="signup-pin"
        name="pin"
        type="password"
        inputmode="numeric"
        pattern="\d{4,6}"
        placeholder="4 to 6 digits"
        required
      />
      <a class="pin-help-link" href="/change-pin">Forgot PIN?</a>

      <button id="signup-submit" class="auth-btn" type="submit">
        Create Account
      </button>
    </form>
    <div id="signup-message" class="auth-message" aria-live="polite"></div>
    <p class="auth-footnote">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </section>
</main>
{% endblock %}
