{% extends 'base.html' %} {% block content %}
<section class="page-header">
  <h2>Create an Account</h2>
  <p>Enter your details to open a simulated account.</p>
</section>

<section class="card form-card" data-page="create">
  <form method="POST" action="/api/create_account" class="auth-form">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <label for="name">Full Name</label>
    <input id="name" name="name" type="text" placeholder="Ava Banks" required />

    <label for="email">Email</label>
    <input
      id="email"
      name="email"
      type="email"
      placeholder="ava@bank.com"
      required
    />

    <label for="account_type">Account Type</label>
    <select id="account_type" name="account_type" required>
      <option value="">Select type</option>
      <option value="savings">Savings (Min balance ₹1000)</option>
      <option value="current">Current (Min balance ₹5000)</option>
    </select>

    <label for="initial_deposit">Initial Deposit</label>
    <input
      id="initial_deposit"
      name="initial_deposit"
      type="number"
      min="0"
      step="0.01"
      value="0"
    />

    <button class="btn primary" type="submit">Create Account</button>
  </form>
</section>
{% endblock %}
